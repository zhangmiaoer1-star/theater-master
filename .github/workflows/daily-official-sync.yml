name: Daily Official Sync

on:
  schedule:
    - cron: "15 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebase onto latest main before refresh
        run: git pull --rebase origin main

      - name: Refresh official sync data
        run: python scripts/refresh_theater_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/official-sync.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh official sync data"
          git push origin HEAD:main || (
            git pull --rebase origin main &&
            python scripts/refresh_theater_data.py &&
            git add data/official-sync.json &&
            git diff --cached --quiet && exit 0
            git commit --amend --no-edit &&
            git push origin HEAD:main
          )
